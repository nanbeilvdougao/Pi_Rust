name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace
        run: cargo test --workspace

  feature-matrix:
    name: feature tests (${{ matrix.feature }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: pi-session, feature: sqlite-index }
          - { crate: pi-ext,     feature: wasm }
          - { crate: pi-auth,    feature: keyring }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test -p ${{ matrix.crate }} --features ${{ matrix.feature }}
        run: cargo test -p ${{ matrix.crate }} --features ${{ matrix.feature }}
